<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - CF-Blog 后台</title>
    <link rel="icon" type="image/x-icon" href="https://gh.static.aaqq.site/cfblog/themes/JustNews/gdtool/zhaopp/cfblog/favicon.ico" />
    <link rel="stylesheet" href="https://gh.lib.aaqq.site/bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://gh.static.aaqq.site/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h2 {
            color: #333;
            font-weight: 300;
            margin: 10px 0;
        }
        
        .login-header img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
        }
        
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }
        
        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            transition: color 0.3s;
        }
        
        .form-group input {
            padding-left: 45px;
            height: 45px;
            border-radius: 5px;
            border: 1px solid #ddd;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102,126,234,0.1);
            outline: none;
        }
        
        .form-group input:focus + i {
            color: #667eea;
        }
        
        .login-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            height: 45px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        
        .login-footer {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 13px;
        }
        
        .login-footer a {
            color: #667eea;
            text-decoration: none;
        }
        
        .login-footer a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            color: #f44336;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }
        
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.8);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="https://gh.static.aaqq.site/cfblog/themes/JustNews/files/logo2.png" alt="Logo">
            <h2>CF-Blog 后台管理</h2>
        </div>
        
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <input type="text" class="form-control" id="username" placeholder="用户名" required>
                <i class="fa fa-user"></i>
            </div>
            
            <div class="form-group">
                <input type="password" class="form-control" id="password" placeholder="密码" required>
                <i class="fa fa-lock"></i>
                <div class="error-message" id="loginError">用户名或密码错误</div>
            </div>
            
            <button type="submit" class="login-btn">登 录</button>
        </form>
        
        <div class="login-footer">
            <p>Powered by <a href="https://www.cloudflare.com" target="_blank">Cloudflare</a> & <a href="https://blog.gezhong.vip" target="_blank">CF-Blog</a></p>
        </div>
    </div>
    
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
    </div>

    <script src="https://gh.lib.aaqq.site/jquery/2.2.4/jquery.min.js"></script>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            
            const username = $('#username').val();
            const password = $('#password').val();
            
            if (!username || !password) {
                $('#loginError').text('请输入用户名和密码').show();
                return false;
            }
            
            $('#loading').css('display', 'flex');
            
            // 发送登录请求
            $.ajax({
                url: '/admin/login/',
                type: 'POST',
                data: JSON.stringify({
                    username: username,
                    password: password
                }),
                contentType: 'application/json',
                success: function(response) {
                    if (response.success) {
                        window.location.href = '/admin/';
                    } else {
                        $('#loading').hide();
                        $('#loginError').text(response.message || '登录失败').show();
                    }
                },
                error: function(xhr) {
                    $('#loading').hide();
                    if (xhr.status === 401) {
                        $('#loginError').text('用户名或密码错误').show();
                    } else {
                        $('#loginError').text('登录失败，请重试').show();
                    }
                }
            });
            
            return false;
        }
    </script>
</body>
</html>
