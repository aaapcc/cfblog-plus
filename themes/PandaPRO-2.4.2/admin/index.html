<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF-Blog 后台管理</title>
    <link rel="icon" type="image/x-icon" href="https://gh.static.aaqq.site/cfblog/themes/JustNews/gdtool/zhaopp/cfblog/favicon.ico" />
    <link rel="stylesheet" href="https://gh.lib.aaqq.site/bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://gh.static.aaqq.site/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://gh.static.aaqq.site/editor.md-1.5.0/css/editormd.css" />
    <link rel="stylesheet" href="https://gh.lib.aaqq.site/bootstrap-select/1.9.4/css/bootstrap-select.min.css">
    
    <style>
        /* 只保留布局样式，完全不影响编辑器内部 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f7fb; }
        
        /* 侧边栏 - 固定宽度，渐变背景 */
        .sidebar {
            position: fixed; left: 0; top: 0; bottom: 0; width: 260px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; z-index: 1000;
        }
        
        .sidebar-header {
            padding: 30px 20px; text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .sidebar-header img {
            width: 60px; height: 60px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        .sidebar-header h3 { font-size: 16px; margin: 10px 0 0; }
        
        .sidebar-menu { padding: 20px 0; }
        
        .menu-item {
            padding: 12px 25px; cursor: pointer; display: flex; align-items: center;
            color: rgba(255,255,255,0.8); border-left: 3px solid transparent;
        }
        
        .menu-item:hover { background: rgba(255,255,255,0.1); }
        .menu-item.active {
            background: rgba(255,255,255,0.15);
            border-left-color: #ffd700;
        }
        
        .menu-item i { width: 24px; margin-right: 10px; }
        .menu-item .badge {
            background: #ffd700; color: #333; margin-left: auto;
            padding: 2px 6px; border-radius: 10px; font-size: 11px;
        }
        
        /* 主内容区 */
        .main-content { margin-left: 260px; padding: 20px; }
        
        /* 顶部导航 */
        .top-nav {
            background: white; border-radius: 5px; padding: 15px 25px;
            margin-bottom: 20px; display: flex; align-items: center;
            justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .page-title { font-size: 18px; }
        .page-title i { margin-right: 8px; color: #667eea; }
        
        /* 用户菜单 */
        .user-info { position: relative; }
        .user-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; align-items: center; justify-content: center;
            color: white; cursor: pointer;
        }
        .dropdown-menu {
            display: none; position: absolute; right: 0; top: 50px;
            background: white; border-radius: 5px; box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            width: 150px; z-index: 1000;
        }
        .dropdown-menu.show { display: block; }
        .dropdown-menu a {
            padding: 10px 15px; display: block; color: #333;
            text-decoration: none;
        }
        .dropdown-menu a:hover { background: #f5f7fb; }
        
        /* 卡片 - 只做背景和间距 */
        .card {
            background: white; border-radius: 5px; padding: 20px;
            margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .card-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 15px; padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        
        .card-header h3 { font-size: 16px; margin: 0; }
        .card-header h3 i { color: #667eea; margin-right: 8px; }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 20px; margin-bottom: 20px;
        }
        
        .stat-card {
            background: white; border-radius: 5px; padding: 20px;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .stat-icon {
            width: 50px; height: 50px; border-radius: 5px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 24px;
        }
        
        .stat-info h4 { font-size: 14px; color: #999; margin: 0 0 5px; font-weight: 400; }
        .stat-info .stat-number { font-size: 24px; font-weight: 600; }
        
        /* 表格 */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: #f8f9fa; padding: 10px; font-weight: 500;
            color: #555; border-bottom: 2px solid #eee;
        }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        
        /* 按钮 */
        .btn {
            padding: 6px 15px; border-radius: 5px; font-size: 13px;
            border: none; cursor: pointer; display: inline-flex;
            align-items: center; gap: 5px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a6fd8; }
        .btn-default { background: #f0f2f5; color: #666; }
        .btn-default:hover { background: #e4e6e9; }
        .btn-danger { background: #f44336; color: white; }
        
        /* 表单 - 只作用于直接子元素 */
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block; margin-bottom: 5px; font-weight: 500;
        }
        .form-control {
            width: 100%; padding: 8px 12px; border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        /* 标签页 */
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        
        /* 提示框 */
        .alert {
            position: fixed; top: 20px; right: 20px; padding: 12px 20px;
            border-radius: 5px; color: white; z-index: 9999; display: none;
        }
        .alert.success { background: #4caf50; }
        .alert.error { background: #f44336; }
        
        /* 重要：不要给编辑器添加任何额外的样式 */
        .editormd {
            margin-top: 20px !important;
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <img src="https://gh.static.aaqq.site/cfblog/themes/JustNews/files/logo2.png" alt="logo">
            <h3>CF-Blog 后台</h3>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item active" data-target="#dashboard">
                <i class="fa fa-dashboard"></i> 仪表盘
            </div>
            <div class="menu-item" data-target="#list">
                <i class="fa fa-list"></i> 文章管理
                <span class="badge" id="articleCount">0</span>
            </div>
            <div class="menu-item" data-target="#new">
                <i class="fa fa-pencil"></i> 写文章
            </div>
            <div class="menu-item" data-target="#config">
                <i class="fa fa-cog"></i> 系统设置
            </div>
            <div class="menu-item" data-target="#pub">
                <i class="fa fa-cloud-upload"></i> 发布
            </div>
        </div>
    </div>
    
    <!-- 主内容区 -->
    <div class="main-content">
        <div class="top-nav">
            <div class="page-title">
                <i class="fa fa-dashboard"></i> 仪表盘
            </div>
            <div class="user-info">
                <div class="user-avatar" onclick="$('#userMenu').toggleClass('show')">A</div>
                <div class="dropdown-menu" id="userMenu">
                    <a href="#" onclick="logout()"><i class="fa fa-sign-out"></i> 退出登录</a>
                </div>
            </div>
        </div>
        
        <!-- 仪表盘 -->
        <div class="tab-pane active" id="dashboard">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fa fa-file-text"></i></div>
                    <div class="stat-info">
                        <h4>总文章数</h4>
                        <div class="stat-number" id="totalArticles">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fa fa-eye"></i></div>
                    <div class="stat-info">
                        <h4>总阅读量</h4>
                        <div class="stat-number" id="totalViews">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fa fa-tags"></i></div>
                    <div class="stat-info">
                        <h4>分类数</h4>
                        <div class="stat-number" id="totalCategories">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fa fa-link"></i></div>
                    <div class="stat-info">
                        <h4>友链数</h4>
                        <div class="stat-number" id="totalLinks">0</div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <h3><i class="fa fa-clock-o"></i> 最近文章</h3>
                    <a href="#" onclick="$('.menu-item[data-target=\"#list\"]').click()" class="btn btn-default btn-sm">查看全部</a>
                </div>
                <div class="table-container">
                    <table id="recentArticles">
                        <thead>
                            <tr><th>ID</th><th>标题</th><th>分类</th><th>阅读量</th><th>创建时间</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- 文章列表 -->
        <div class="tab-pane" id="list">
            <div class="card">
                <div class="card-header">
                    <h3><i class="fa fa-list"></i> 文章列表</h3>
                    <button class="btn btn-primary btn-sm" onclick="$('.menu-item[data-target=\"#new\"]').click()">
                        <i class="fa fa-plus"></i> 写新文章
                    </button>
                </div>
                <div class="table-container">
                    <table id="articleList">
                        <thead>
                            <tr><th>ID</th><th>标题</th><th>分类</th><th>标签</th><th>阅读量</th><th>创建时间</th><th>操作</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <input type="hidden" id="page" value="1">
                <div style="text-align:center; margin-top:15px;">
                    <a id="loadmore" class="btn btn-default">加载更多</a>
                </div>
            </div>
        </div>
        
        <!-- 写文章 -->
        <div class="tab-pane" id="new">
            <div class="card">
                <div class="card-header">
                    <h3><i class="fa fa-pencil"></i> <span id="labelNew">新增文章</span></h3>
                </div>
                <form id="addNewForm">
                    <input type="hidden" name="id" id="id">
                    
                    <div class="row">
                        <div class="col-md-12">
                            <div class="form-group">
                                <label>标题 <span style="color:red">*</span></label>
                                <input type="text" class="form-control" name="title" id="title" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>特色图片</label>
                                <input type="url" class="form-control" name="img" id="img" placeholder="https://...">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>永久链接</label>
                                <input type="text" class="form-control" name="link" id="link" placeholder="url-slug">
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>创建日期</label>
                                <input type="datetime-local" class="form-control" id="createDate" name="createDate" required>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>分类</label>
                                <select class="selectpicker" multiple name="category[]" id="category"></select>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>标签</label>
                                <input type="text" class="form-control" name="tags" id="tags" placeholder="标签1,标签2">
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>权重</label>
                                <input type="text" class="form-control" name="priority" id="priority" value="0.5">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>更新频率</label>
                                <select class="form-control" id="changefreq" name="changefreq">
                                    <option value="daily">daily</option>
                                    <option value="hourly">hourly</option>
                                    <option value="weekly">weekly</option>
                                    <option value="monthly">monthly</option>
                                    <option value="yearly">yearly</option>
                                    <option value="never">never</option>
                                    <option value="always">always</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 编辑器区域 - 完全交给editormd控制 -->
                    <div id="content">
                        <textarea style="display:none;"></textarea>
                    </div>
                    
                    <div style="text-align:center; margin-top:20px;">
                        <button type="button" class="btn btn-primary" onclick="saveAddNew()">保存文章</button>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- 设置 -->
        <div class="tab-pane" id="config">
            <div class="card">
                <div class="card-header">
                    <h3><i class="fa fa-cog"></i> 系统设置</h3>
                </div>
                <form id="configForm">
                    <div class="form-group">
                        <label>分类</label>
                        <textarea class="form-control" id="WidgetCategory" rows="3"></textarea>
                        <small>JSON格式：["分类A","分类B"]</small>
                    </div>
                    <div class="form-group">
                        <label>菜单</label>
                        <textarea class="form-control" id="WidgetMenu" rows="5"></textarea>
                        <small>JSON格式：[{"title":"首页","url":"/"}]</small>
                    </div>
                    <div class="form-group">
                        <label>友情链接</label>
                        <textarea class="form-control" id="WidgetLink" rows="5"></textarea>
                        <small>JSON格式：[{"title":"谷歌","url":"https://google.com"}]</small>
                    </div>
                    <button type="button" class="btn btn-primary" onclick="saveConfig()">保存</button>
                </form>
                <hr>
                <form id="importForm">
                    <div class="form-group">
                        <label>导入/导出</label>
                        <textarea class="form-control" id="importJson" rows="3" placeholder="粘贴导出的JSON数据"></textarea>
                    </div>
                    <button type="button" class="btn btn-default" onclick="importBlog()">导入</button>
                    <a href="/admin/export/" class="btn btn-default">导出</a>
                </form>
            </div>
        </div>
        
        <!-- 发布 -->
        <div class="tab-pane" id="pub">
            <div class="card" style="text-align:center; padding:40px;">
                <p>发布操作会清除所有缓存，使修改生效。前端需要按 Ctrl+F5 强制刷新。</p>
                <button class="btn btn-primary btn-lg" onclick="publish()">立即发布</button>
            </div>
        </div>
    </div>
    
    <div class="alert" id="alertMessage"></div>
    
    <script src="https://gh.lib.aaqq.site/jquery/2.2.4/jquery.min.js"></script>
    <script src="https://gh.lib.aaqq.site/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <script src="https://gh.static.aaqq.site/editor.md-1.5.0/editormd.js"></script>
    <script src="https://gh.lib.aaqq.site/bootstrap-select/1.9.4/js/bootstrap-select.min.js"></script>
    
    <script>
        var mdEditor, 
            categoryJson = <!--{categoryJson}--> || [],
            menuJson = <!--{menuJson}--> || [],
            linkJson = <!--{linkJson}--> || [],
            allArticles = [];
        
        $(function() {
            // 初始化编辑器 - 完全按照原始方式
            if ($('#content').length) {
                mdEditor = editormd("content", {
                    width: "100%",
                    height: 640,
                    path: "https://cdn.jsdelivr.net/npm/editor.md@1.5.0/lib/",
                    appendMarkdown : "# MarkDown",
                    saveHTMLToTextarea: true,
                    tex: true,
                    codeFold: true,
                    emoji: true,
                    taskList: true
                });
            }
            
            // 初始化分类下拉框
            initCategorySelect();
            
            // 初始化设置表单
            $('#WidgetCategory').val(JSON.stringify(categoryJson));
            $('#WidgetMenu').val(JSON.stringify(menuJson));
            $('#WidgetLink').val(JSON.stringify(linkJson));
            
            // 设置默认日期
            $('#createDate').val(new Date().toISOString().slice(0,16));
            
            // 加载所有数据
            loadAllData();
            
            // 菜单切换
            $('.menu-item').click(function() {
                var target = $(this).data('target');
                $('.menu-item').removeClass('active');
                $(this).addClass('active');
                $('.tab-pane').removeClass('active');
                $(target).addClass('active');
                
                var text = $(this).text().trim().replace(/[0-9]/g, '');
                var icon = $(this).find('i').attr('class');
                $('.page-title').html('<i class="' + icon + '"></i> ' + text);
            });
            
            // 点击其他地方关闭下拉菜单
            $(document).click(function(e) {
                if (!$(e.target).closest('.user-info').length) {
                    $('#userMenu').removeClass('show');
                }
            });
        });
        
        function initCategorySelect() {
            var category = $('#category');
            category.empty();
            for (var i = 0; i < categoryJson.length; i++) {
                category.append('<option value="' + categoryJson[i] + '">' + categoryJson[i] + '</option>');
            }
            category.selectpicker('refresh');
        }
        
        function loadAllData() {
            $.ajax({
                url: '/admin/getList/1/',
                type: 'GET',
                dataType: 'json',
                success: function(data) {
                    allArticles = data || [];
                    if (data && data.length === 20) {
                        loadMorePages(2);
                    } else {
                        afterDataLoaded();
                    }
                }
            });
        }
        
        function loadMorePages(page) {
            $.ajax({
                url: '/admin/getList/' + page + '/',
                type: 'GET',
                dataType: 'json',
                success: function(data) {
                    if (data && data.length) {
                        allArticles = allArticles.concat(data);
                        if (data.length === 20) {
                            loadMorePages(page + 1);
                        } else {
                            afterDataLoaded();
                        }
                    } else {
                        afterDataLoaded();
                    }
                }
            });
        }
        
        function afterDataLoaded() {
            displayArticles(allArticles.slice(0, 20));
            updateStats();
            updateRecentArticles();
            
            $('#articleCount').text(allArticles.length);
            if (allArticles.length <= 20) {
                $('#loadmore').hide();
            } else {
                $('#loadmore').show();
            }
        }
        
        function displayArticles(articles) {
            var tbody = $('#articleList tbody').empty();
            $.each(articles, function(i, a) {
                tbody.append('<tr>' +
                    '<td>' + a.id + '</td>' +
                    '<td><a href="/admin/edit/' + a.id + '/">' + a.title + '</a></td>' +
                    '<td>' + (a.category ? a.category.join(', ') : '-') + '</td>' +
                    '<td>' + (a.tags ? a.tags.join(', ') : '-') + '</td>' +
                    '<td>' + (a.views || 0) + '</td>' +
                    '<td>' + (a.createDate ? a.createDate.replace('T', ' ') : '-') + '</td>' +
                    '<td>' +
                        '<a href="/admin/edit/' + a.id + '/" class="btn btn-default btn-sm" style="margin-right:5px;"><i class="fa fa-edit"></i></a>' +
                        '<button class="btn btn-danger btn-sm" onclick="deleteArticle(\'' + a.id + '\')"><i class="fa fa-trash"></i></button>' +
                    '</td>' +
                '</tr>');
            });
        }
        
        function updateStats() {
            $('#totalArticles').text(allArticles.length);
            var totalViews = 0;
            $.each(allArticles, function(i, a) { totalViews += a.views || 0; });
            $('#totalViews').text(totalViews);
            $('#totalCategories').text(categoryJson.length);
            $('#totalLinks').text(linkJson.length);
        }
        
        function updateRecentArticles() {
            var tbody = $('#recentArticles tbody').empty();
            var recent = allArticles.slice(0, 5);
            $.each(recent, function(i, a) {
                tbody.append('<tr>' +
                    '<td>' + a.id + '</td>' +
                    '<td><a href="/admin/edit/' + a.id + '/">' + a.title + '</a></td>' +
                    '<td>' + (a.category ? a.category.join(', ') : '-') + '</td>' +
                    '<td>' + (a.views || 0) + '</td>' +
                    '<td>' + (a.createDate ? a.createDate.replace('T', ' ') : '-') + '</td>' +
                '</tr>');
            });
        }
        
        $('#loadmore').click(function() {
            var current = $('#articleList tbody tr').length;
            var more = allArticles.slice(current, current + 20);
            if (more.length) {
                var tbody = $('#articleList tbody');
                $.each(more, function(i, a) {
                    tbody.append('<tr>' +
                        '<td>' + a.id + '</td>' +
                        '<td><a href="/admin/edit/' + a.id + '/">' + a.title + '</a></td>' +
                        '<td>' + (a.category ? a.category.join(', ') : '-') + '</td>' +
                        '<td>' + (a.tags ? a.tags.join(', ') : '-') + '</td>' +
                        '<td>' + (a.views || 0) + '</td>' +
                        '<td>' + (a.createDate ? a.createDate.replace('T', ' ') : '-') + '</td>' +
                        '<td>' +
                            '<a href="/admin/edit/' + a.id + '/" class="btn btn-default btn-sm" style="margin-right:5px;"><i class="fa fa-edit"></i></a>' +
                            '<button class="btn btn-danger btn-sm" onclick="deleteArticle(\'' + a.id + '\')"><i class="fa fa-trash"></i></button>' +
                        '</td>' +
                    '</tr>');
                });
            }
            if ($('#articleList tbody tr').length >= allArticles.length) {
                $(this).hide();
            }
        });
        
        function deleteArticle(id) {
            if (confirm('确定要删除这篇文章吗？')) {
                $.ajax({
                    type: 'POST',
                    url: '/admin/delete/' + id + '/',
                    dataType: 'json',
                    success: function(r) {
                        showAlert(r.msg || '删除成功', 'success');
                        loadAllData();
                    }
                });
            }
        }
        
        function saveAddNew() {
            if (!$('#title').val() || !$('#category').val()) {
                showAlert('请填写标题和分类', 'error');
                return;
            }
            
            var url = $('#id').val() ? '/admin/saveEdit/' : '/admin/saveAddNew/';
            
            $.ajax({
                type: 'POST',
                url: url,
                contentType: 'application/json',
                data: JSON.stringify($('#addNewForm').serializeArray()),
                dataType: 'json',
                success: function(r) {
                    showAlert(r.msg || '保存成功', 'success');
                    if (r.id) {
                        $('#id').val(r.id);
                        $('#labelNew').text('编辑文章 - ' + r.id);
                    }
                    loadAllData();
                }
            });
        }
        
        function saveConfig() {
            if (!isJSON($('#WidgetCategory').val()) || !isJSON($('#WidgetMenu').val()) || !isJSON($('#WidgetLink').val())) {
                showAlert('JSON格式错误', 'error');
                return;
            }
            
            $.ajax({
                type: 'POST',
                url: '/admin/saveConfig/',
                contentType: 'application/json',
                data: JSON.stringify($('#configForm').serializeArray()),
                dataType: 'json',
                success: function(r) {
                    showAlert(r.msg || '保存成功', 'success');
                }
            });
        }
        
        function importBlog() {
            if (!isJSON($('#importJson').val())) {
                showAlert('导入格式错误', 'error');
                return;
            }
            
            $.ajax({
                type: 'POST',
                url: '/admin/import/',
                contentType: 'application/json',
                data: JSON.stringify($('#importForm').serializeArray()),
                dataType: 'json',
                success: function(r) {
                    showAlert(r.msg || '导入成功', 'success');
                    loadAllData();
                }
            });
        }
        
        function publish() {
            if (confirm('确定要发布吗？')) {
                $.ajax({
                    type: 'POST',
                    url: '/admin/publish/',
                    dataType: 'json',
                    success: function(r) {
                        showAlert(r.msg || '发布成功', 'success');
                    }
                });
            }
        }
        
        function isJSON(str) {
            if (typeof str !== 'string') return false;
            try {
                JSON.parse(str);
                return true;
            } catch(e) {
                return false;
            }
        }
        
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                window.location.href = '/admin/logout/';
            }
        }
        
        function showAlert(msg, type) {
            $('#alertMessage').removeClass('success error').addClass(type).text(msg).fadeIn();
            setTimeout(function() {
                $('#alertMessage').fadeOut();
            }, 3000);
        }
    </script>
</body>
</html>
